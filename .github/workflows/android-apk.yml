name: Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" || \
          sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        run: bun run build

      - name: Add Android platform
        run: bunx cap add android || true

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Verify APK
        run: test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tanner-terminal-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
