name: Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Ensure sdkmanager exists (install cmdline-tools if missing)
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          if [ -x "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" ]; then exit 0; fi
          cd "${ANDROID_SDK_ROOT}/cmdline-tools"
          rm -rf latest latest.tmp tools.zip
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          # SHA-256 checksum for commandlinetools-linux-11076708_latest.zip
          # Update this value if the URL or tool version changes.
          EXPECTED_TOOLS_ZIP_SHA256="aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          echo "${EXPECTED_TOOLS_ZIP_SHA256}  tools.zip" | sha256sum -c -
          mkdir -p latest.tmp
          unzip -q tools.zip -d latest.tmp
          rm tools.zip
          if [ -d latest.tmp/cmdline-tools ]; then
            mv latest.tmp/cmdline-tools/* latest.tmp/
            rmdir latest.tmp/cmdline-tools
          fi
          mv latest.tmp latest

      - name: Add Android tools to PATH
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "$GITHUB_PATH"

      - name: Accept Android licenses
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${PATH}"
          set +o pipefail
          yes | sdkmanager --licenses
          status_yes=${PIPESTATUS[0]}
          status_sdk=${PIPESTATUS[1]}
          set -o pipefail
          if [ "$status_sdk" -ne 0 ]; then
            echo "sdkmanager --licenses failed with exit code $status_sdk" >&2
            exit "$status_sdk"
          fi
          if [ "$status_yes" -ne 0 ] && [ "$status_yes" -ne 141 ]; then
            echo "yes command failed with exit code $status_yes" >&2
            exit "$status_yes"
          fi

      - name: Show available Android SDK packages
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${PATH}"
          if ! sdkmanager --list > sdkmanager-list.txt; then

      - name: Install Android SDK (34 with conditional fallback to 33)
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"

          # Try to install Android 34; capture output to decide whether to fall back
          set +e
          SDKMANAGER_OUTPUT=$(sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1)
          SDKMANAGER_STATUS=$?
          echo "${SDKMANAGER_OUTPUT}"
          set -e

          if [ "${SDKMANAGER_STATUS}" -ne 0 ]; then
            if echo "${SDKMANAGER_OUTPUT}" | grep -q "Failed to find package"; then
              echo "Android 34 packages not available; falling back to Android 33..." >&2
              sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2"
            else
              echo "sdkmanager failed installing Android 34 for an unexpected reason; not falling back." >&2
              exit "${SDKMANAGER_STATUS}"
            fi
          fi
      - name: Verify SDK
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
          command -v sdkmanager
          sdkmanager --version

      - name: Install deps
        run: npm ci

      - name: Build web + sync Capacitor
        run: npm run mobile:prep

      - name: Build Android debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sweet-puppy-hub-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
