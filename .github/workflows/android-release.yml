name: Android Signed Release APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          bun install

      - name: Build web assets
        shell: bash
        run: |
          set -euxo pipefail
          bun run mobile:prep

      - name: Ensure Android platform exists
        shell: bash
        run: |
          set -euxo pipefail
          test -d android || bunx cap add android

      - name: Detect required Android SDK level
        id: sdk
        shell: bash
        run: |
          set -euxo pipefail
          COMPILE_SDK=$(grep -E 'compileSdkVersion\s*=\s*[0-9]+' android/variables.gradle | grep -Eo '[0-9]+' | head -1)
          if [ -z "$COMPILE_SDK" ]; then
            echo "Failed to detect compileSdkVersion from android/variables.gradle"
            exit 1
          fi
          echo "compile_sdk=$COMPILE_SDK" >> "$GITHUB_OUTPUT"

      - name: Ensure sdkmanager exists
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          if command -v sdkmanager >/dev/null 2>&1; then exit 0; fi
          cd "${ANDROID_SDK_ROOT}/cmdline-tools"
          rm -rf latest latest.tmp tools.zip
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          mkdir -p latest.tmp
          unzip -q tools.zip -d latest.tmp
          rm tools.zip
          if [ -d latest.tmp/cmdline-tools ]; then
            mv latest.tmp/cmdline-tools/* latest.tmp/
            rmdir latest.tmp/cmdline-tools
          fi
          mv latest.tmp latest

      - name: Add Android tools to PATH
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "$GITHUB_PATH"

      - name: Accept Android licenses
        shell: bash
        run: |
          set -euxo pipefail
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null
          set -o pipefail

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          REQUIRED="${{ steps.sdk.outputs.compile_sdk }}"
          sdkmanager --install "platform-tools"
          for API in "$REQUIRED" 36 35 34; do
            sdkmanager --install "platforms;android-${API}" || true
          done
          for BUILD_TOOLS in 36.0.0 35.0.0 34.0.0; do
            sdkmanager --install "build-tools;${BUILD_TOOLS}" || true
          done
          CHOSEN=""
          for API in "$REQUIRED" 36 35 34; do
            if [ -d "${ANDROID_SDK_ROOT}/platforms/android-${API}" ]; then
              CHOSEN="$API"
              break
            fi
          done
          if [ -z "$CHOSEN" ]; then
            echo "No compatible Android platform was installed"
            exit 1
          fi
          if [ "$CHOSEN" != "$REQUIRED" ]; then
            sed -i -E "s/compileSdkVersion\s*=\s*[0-9]+/compileSdkVersion = ${CHOSEN}/" android/variables.gradle
            sed -i -E "s/targetSdkVersion\s*=\s*[0-9]+/targetSdkVersion = ${CHOSEN}/" android/variables.gradle
          fi

      - name: Sync Capacitor Android
        shell: bash
        run: |
          set -euxo pipefail
          bunx cap sync android

      - name: Decode keystore
        shell: bash
        run: |
          set -euxo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

      - name: Build signed release APK
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release-keystore.jks \
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"

      - name: Verify release APK exists
        shell: bash
        run: |
          set -euxo pipefail
          test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tanner-terminal-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
