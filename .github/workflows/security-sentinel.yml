name: Tanner Sentinel — Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # Nightly at 3 AM UTC

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  security-scan:
    name: Security Sentinel Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen

      - name: Run Tanner Sentinel scan
        id: scan
        run: bash scripts/security/scan.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-report-${{ github.run_id }}
          path: sentinel-report.json
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              const data = JSON.parse(fs.readFileSync('sentinel-report.json', 'utf8'));
              const blocked = data.findings.filter(f => f.blocked);
              const errors = data.findings.filter(f => f.severity === 'critical' || f.severity === 'high');
              report = `## 🛡️ Tanner Sentinel — Security Report\n\n`;
              report += `**Status:** ${data.passed ? '✅ Passed' : '❌ Blocked'}\n`;
              report += `**Findings:** ${data.findings.length} total, ${blocked.length} blocked, ${errors.length} critical/high\n\n`;
              if (blocked.length > 0) {
                report += `### 🚫 Blocked Issues\n\n`;
                report += `| Severity | Issue | File | Action |\n|----------|-------|------|--------|\n`;
                blocked.forEach(f => {
                  report += `| ${f.severity} | ${f.issue} | \`${f.file}\` | ${f.recommendation} |\n`;
                });
              }
              if (errors.length > 0) {
                report += `\n### ⚠️ Critical/High Issues\n\n`;
                errors.filter(f => !f.blocked).forEach(f => {
                  report += `- **${f.severity}**: ${f.issue} in \`${f.file}\` — ${f.recommendation}\n`;
                });
              }
            } catch (e) {
              report = '## 🛡️ Tanner Sentinel\n\n❌ Security scan failed. Check workflow logs.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen

      # Bun-only lockfile enforcement
      - name: Verify Bun-only lockfile
        run: |
          if [ ! -f bun.lockb ]; then
            echo "::error::bun.lockb is missing — Bun-only policy"
            exit 1
          fi
          for BAD in package-lock.json yarn.lock pnpm-lock.yaml bun.lock; do
            if [ -f "$BAD" ]; then
              echo "::error::Found $BAD — remove it, this repo is Bun-only"
              exit 1
            fi
          done
          echo "✓ Bun-only lockfile verified"

      - name: Check React version
        run: |
          REACT_VER=$(node -e "console.log(require('./node_modules/react/package.json').version)")
          MAJOR=$(echo "$REACT_VER" | cut -d. -f1)
          if [ "$MAJOR" != "18" ]; then
            echo "::error::React must be 18.x, found $REACT_VER"
            exit 1
          fi
          echo "React version OK: $REACT_VER"
