name: Tanner Sentinel ‚Äî Security Scan

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]
  schedule:
    - cron: '0 3 * * *' # Nightly at 3 AM UTC

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  security-scan:
    name: Security Sentinel Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Tanner Sentinel scan
        id: scan
        run: bash scripts/security/scan.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-report-${{ github.run_id }}
          path: sentinel-report.json
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              const data = JSON.parse(fs.readFileSync('sentinel-report.json', 'utf8'));
              const blocked = data.findings.filter(f => f.blocked);
              const errors = data.findings.filter(f => f.severity === 'critical' || f.severity === 'high');
              report = `## üõ°Ô∏è Tanner Sentinel ‚Äî Security Report\n\n`;
              report += `**Status:** ${data.passed ? '‚úÖ Passed' : '‚ùå Blocked'}\n`;
              report += `**Findings:** ${data.findings.length} total, ${blocked.length} blocked, ${errors.length} critical/high\n\n`;
              if (blocked.length > 0) {
                report += `### üö´ Blocked Issues\n\n`;
                report += `| Severity | Issue | File | Action |\n|----------|-------|------|--------|\n`;
                blocked.forEach(f => {
                  report += `| ${f.severity} | ${f.issue} | \`${f.file}\` | ${f.recommendation} |\n`;
                });
              }
              if (errors.length > 0) {
                report += `\n### ‚öÝÔ∏è Critical/High Issues\n\n`;
                errors.filter(f => !f.blocked).forEach(f => {
                  report += `- **${f.severity}**: ${f.issue} in \`${f.file}\` ‚Äî ${f.recommendation}\n`;
                });
              }
            } catch (e) {
              report = '## üõ°Ô∏è Tanner Sentinel\n\n‚ùå Security scan failed. Check workflow logs.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high || true

      - name: Check lockfile consistency
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is missing ‚Äî npm only policy"
            exit 1
          fi
          npm ci --ignore-scripts 2>&1 | grep -i "npm warn" && echo "::warning::Lockfile may have drift" || true

      - name: Check React version
        run: |
          REACT_VER=$(node -e "console.log(require('./node_modules/react/package.json').version)")
          MAJOR=$(echo "$REACT_VER" | cut -d. -f1)
          if [ "$MAJOR" != "18" ]; then
            echo "::error::React must be 18.x, found $REACT_VER"
            exit 1
          fi
          echo "React version OK: $REACT_VER"
