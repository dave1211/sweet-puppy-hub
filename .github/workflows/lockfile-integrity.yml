name: Lockfile Integrity Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lock'
      - 'bun.lockb'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lock'
      - 'bun.lockb'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  pull-requests: none
  id-token: none
  actions: none
  checks: none
  deployments: none
  issues: none
  statuses: none

# PHASE 5: Concurrency control
concurrency:
  group: lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-check:
    name: Verify Single Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: CRITICAL - Check for mixed lockfiles
        id: check
        run: |
          echo "========================================="
          echo "LOCKFILE INTEGRITY CHECK"
          echo "========================================="
          
          HAS_NPM=$([ -f package-lock.json ] && echo "true" || echo "false")
          HAS_BUN=$([ -f bun.lockb ] && echo "true" || echo "false")
          HAS_BUN_OLD=$([ -f bun.lock ] && echo "true" || echo "false")
          HAS_YARN=$([ -f yarn.lock ] && echo "true" || echo "false")
          HAS_PNPM=$([ -f pnpm-lock.yaml ] && echo "true" || echo "false")
          
          echo "npm (package-lock.json): $HAS_NPM"
          echo "bun (bun.lockb): $HAS_BUN"
          echo "bun (bun.lock - old): $HAS_BUN_OLD"
          echo "yarn (yarn.lock): $HAS_YARN"
          echo "pnpm (pnpm-lock.yaml): $HAS_PNPM"
          echo ""
          
          LOCKFILE_COUNT=0
          DETECTED_PM=""
          
          [ "$HAS_NPM" = "true" ] && ((LOCKFILE_COUNT++)) && DETECTED_PM="npm"
          [ "$HAS_BUN" = "true" ] && ((LOCKFILE_COUNT++)) && DETECTED_PM="bun"
          [ "$HAS_BUN_OLD" = "true" ] && ((LOCKFILE_COUNT++)) && DETECTED_PM="bun"
          [ "$HAS_YARN" = "true" ] && ((LOCKFILE_COUNT++)) && DETECTED_PM="yarn"
          [ "$HAS_PNPM" = "true" ] && ((LOCKFILE_COUNT++)) && DETECTED_PM="pnpm"
          
          # CRITICAL: This repo ONLY supports Bun
          OFFICIAL_PM="bun"
          
          if [ "$LOCKFILE_COUNT" -gt 1 ]; then
            echo "::error::CRITICAL - MULTIPLE LOCKFILES DETECTED"
            echo "::error::This is a security and stability risk"
            echo "::error::Repository must use exactly ONE package manager"
            echo "::error::Found $LOCKFILE_COUNT lockfile(s), expected 1"
            echo ""
            echo "::error::ACTION REQUIRED:"
            echo "::error::- Keep only: $OFFICIAL_PM.lockb"
            echo "::error::- Remove: package-lock.json, yarn.lock, bun.lock, pnpm-lock.yaml"
            echo "::error::- Commit with message: 'chore: enforce $OFFICIAL_PM single lockfile'"
            exit 1
          fi
          
          if [ "$LOCKFILE_COUNT" -eq 0 ]; then
            echo "::error::CRITICAL - NO LOCKFILE FOUND"
            echo "::error::Repository MUST have bun.lockb"
            echo ""
            echo "::error::ACTION REQUIRED:"
            echo "::error::Run: bun install --frozen"
            echo "::error::Then commit bun.lockb"
            exit 1
          fi
          
          # Verify correct lockfile
          if [ "$HAS_BUN" != "true" ]; then
            echo "::error::CRITICAL - WRONG PACKAGE MANAGER"
            echo "::error::Found: $DETECTED_PM"
            echo "::error::Required: bun (bun.lockb only)"
            echo ""
            echo "::error::This repo is configured for Bun exclusively"
            echo "::error::Detected $DETECTED_PM lockfile must be removed"
            exit 1
          fi
          
          # Check for old bun.lock
          if [ "$HAS_BUN_OLD" = "true" ]; then
            echo "::error::Old bun.lock detected alongside bun.lockb"
            echo "::error::Remove: bun.lock (keep only bun.lockb)"
            exit 1
          fi
          
          echo "✓ Lockfile integrity verified: $OFFICIAL_PM"
          echo "pm=$OFFICIAL_PM" >> "$GITHUB_OUTPUT"

      - name: Verify bun.lockb is not corrupted
        if: steps.check.outputs.pm == 'bun'
        run: |
          echo "Verifying bun.lockb integrity..."
          FILE_SIZE=$(stat -c%s bun.lockb 2>/dev/null || stat -f%z bun.lockb 2>/dev/null || echo "0")
          
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "::error::bun.lockb appears corrupted (size: $FILE_SIZE bytes)"
            exit 1
          fi
          
          echo "✓ bun.lockb size OK: $FILE_SIZE bytes"

      - name: Alert on PR if changes needed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: "github.rest.issues.createComment({issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: 'LOCKFILE INTEGRITY FAILURE - This PR has critical lockfile issues. This repo uses Bun exclusively (bun.lockb only). Remove forbidden lockfiles: package-lock.json, yarn.lock, pnpm-lock.yaml, bun.lock. Run: bun install. See SECURITY.md for details.'})"

  # ===== FAIL FAST IF LOCKFILE IS WRONG =====
  fail-if-wrong-lockfile:
    name: GATE - Lockfile Must Be Correct
    runs-on: ubuntu-latest
    needs: [lockfile-check]
    if: always()
    steps:
      - name: Require lockfile check passed
        run: |
          if [ "${{ needs.lockfile-check.result }}" != "success" ]; then
            echo "::error::Lockfile integrity check failed"
            echo "::error::PR cannot merge until lockfile is correct"
            exit 1
          fi
          echo "✓ Lockfile gate passed"
