name: Repo Policy Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# PHASE 5: Hardened permissions
permissions:
  contents: read
  id-token: none
  actions: none
  checks: none
  deployments: none
  issues: none
  pull-requests: none
  statuses: none

# PHASE 5: Concurrency control
concurrency:
  group: policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-check:
    name: Policy Enforcement
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen

      - name: Run policy checks
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/policy-check.sh
