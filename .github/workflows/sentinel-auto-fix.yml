name: Tanner Sentinel Auto-Fix

on:
  workflow_run:
    workflows: ["Full CI Validation & Gating"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    if: github.event.workflow_run.conclusion == 'failure'
    name: Auto-Fix Sentinel Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Check for fixable issues
        id: check
        run: |
          if [ -f "scripts/sentinel-score.sh" ]; then
            bash scripts/sentinel-score.sh || true
            echo "checks_complete=true" >> "$GITHUB_OUTPUT"
          else
            echo "checks_complete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.checks_complete == 'true'
        run: bun install --frozen

      - name: Apply auto-fixes
        id: fixes
        run: |
          if [ -f "scripts/security/auto-repair.sh" ]; then
            bash scripts/security/auto-repair.sh || true
            if git diff --quiet; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.fixes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(sentinel): auto-fix issues from ci-gate failure"
          title: "fix(sentinel): auto-fix issues from ci-gate failure"
          body: |
            Automated fixes for issues detected by Sentinel.

            Triggered by workflow_run from ci-gate completion.
            Only created if actual changes were made.
          branch: sentinel/auto-fix-work
          base: main
          delete-branch: false
          labels: sentinel, auto-fix
