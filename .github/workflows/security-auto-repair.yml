name: Tanner Sentinel — Auto-Repair

on:
  schedule:
    - cron: '0 4 * * 1' # Weekly Monday 4 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-repair:
    name: Safe Auto-Repair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Run auto-repair
        id: changes
        run: bash scripts/security/auto-repair.sh

      - name: Create or update pull request
        if: steps.changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "security(sentinel): auto-repair low-risk issues"
          title: "security(sentinel): auto-repair low-risk issues"
          body: |
            Automated low-risk security repairs.

            This PR was created by the Security Auto Repair workflow.
            It uses PR flow so protected-branch rules and required checks run normally.
          branch: sentinel/auto-repair
          base: main
          delete-branch: true
          labels: security, auto-repair, sentinel
