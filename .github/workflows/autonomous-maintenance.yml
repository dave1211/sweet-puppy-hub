name: Autonomous Maintenance

on:
  schedule:
    - cron: '0 5 * * 3'  # Weekly Wednesday 5 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autonomous-maintenance
  cancel-in-progress: true

jobs:
  maintain:
    name: Safe Auto-Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen

      # ── Pre-fix validation baseline ──
      - name: Pre-fix policy check
        run: bash scripts/policy-check.sh || true

      # ── Run approved auto-fixes ──
      - name: Run autonomous maintenance
        id: maintain
        run: bash scripts/autonomous-maintenance.sh

      # ── Post-fix validation gate ──
      - name: Post-fix typecheck
        if: steps.maintain.outputs.has_changes == 'true'
        run: bun run typecheck

      - name: Post-fix lint
        if: steps.maintain.outputs.has_changes == 'true'
        run: bun run lint

      - name: Post-fix policy check
        if: steps.maintain.outputs.has_changes == 'true'
        run: bash scripts/policy-check.sh

      - name: Post-fix CI validation
        if: steps.maintain.outputs.has_changes == 'true'
        run: bash scripts/validate-ci.sh || true

      # ── Open PR only when safe ──
      - name: Create maintenance PR
        if: steps.maintain.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(maintenance): autonomous safe fixes"
          title: "chore(maintenance): autonomous safe fixes"
          body: |
            ## 🤖 Autonomous Maintenance

            This PR was created by the autonomous maintenance workflow.
            Only approved fix categories were applied.

            ### What was changed
            - See commit diff for exact changes

            ### What was validated after fixes
            - ✅ TypeScript typecheck
            - ✅ ESLint
            - ✅ Policy check
            - ✅ CI validation

            ### What was NOT touched
            - ❌ React version (locked to 18.x)
            - ❌ Database schema
            - ❌ Auth configuration
            - ❌ Product logic
            - ❌ Secrets or environment values
            - ❌ Workflow permissions
            - ❌ Deno runtime paths
            - ❌ Test architecture

            ### Approved fix categories
            1. Forbidden lockfile removal
            2. Deno lint auto-fix (supabase/functions/ only)
            3. ESLint auto-fix (src/ only)

            ---
            *Safe to merge after required checks pass.*
          branch: maintenance/auto-fix
          base: main
          delete-branch: true
          labels: maintenance, auto-fix, safe
