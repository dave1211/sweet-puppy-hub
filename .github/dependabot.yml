version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    target-branch: main
    labels:
      - dependencies
      - security
    ignore:
      - dependency-name: react
        versions: ['>=19']
      - dependency-name: react-dom
        versions: ['>=19']
    reviewers: []
    versioning-strategy: increase-if-necessary
