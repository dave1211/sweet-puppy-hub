services:
  android-builder:
    image: cimg/android:2025.03
    container_name: tanner-terminal-apk-builder
    user: root
    working_dir: /workspace
    volumes:
      - .:/workspace
      - gradle-cache:/root/.gradle
    environment:
      - GRADLE_USER_HOME=/root/.gradle
    command: >
      bash -c "
        cd /workspace/android &&
        ./gradlew assembleDebug
      "

volumes:
  gradle-cache:
